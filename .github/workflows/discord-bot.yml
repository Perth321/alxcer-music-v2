name: Discord Music Bot 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

permissions:
  actions: write
  contents: read

concurrency:
  group: discord-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg + libopus
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libopus0 libopus-dev libsodium23

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r bot/requirements.txt

      - name: Write YouTube cookies (optional)
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf '%s' "$YOUTUBE_COOKIES" > bot/cookies.txt
            echo "cookies.txt written ($(wc -c < bot/cookies.txt) bytes)"
          else
            echo "No YOUTUBE_COOKIES — using public proxies"
          fi

      - name: Run Discord Music Bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          PYTHONUNBUFFERED: '1'
        run: |
          python -u bot/bot.py

      - name: Auto-restart after exit
        if: ${{ always() }}
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
        run: |
          if [ -z "$BOT_PAT" ]; then
            echo "BOT_PAT not set — cannot self-restart"
            exit 0
          fi
          echo "Re-dispatching workflow..."
          curl -sS -X POST \
            -H "Authorization: Bearer $BOT_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/discord-bot.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Restart dispatched"
