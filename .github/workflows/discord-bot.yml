name: Discord Music Bot 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

permissions:
  actions: write
  contents: read

concurrency:
  group: discord-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install -r bot/requirements.txt

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf '%s' "$YOUTUBE_COOKIES" > bot/cookies.txt
            echo "cookies.txt written ($(wc -c < bot/cookies.txt) bytes)"
          else
            echo "No YOUTUBE_COOKIES secret — YouTube may block this IP"
          fi

      - name: Run Discord Music Bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python bot/bot.py

      - name: Auto-restart after crash
        if: ${{ failure() }}
        run: |
          echo "Bot crashed, triggering restart..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/discord-bot.yml/dispatches \
            -d '{"ref":"main"}'
